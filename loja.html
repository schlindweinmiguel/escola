<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loja</title>
</head>
<body>

<h2>Loja</h2>

<button onclick="adicionar('Camiseta',50)">Camiseta</button>
<button onclick="adicionar('Calça',120)">Calça</button>
<button onclick="adicionar('Moletom',150)">Moletom</button>

<br><br>
<button onclick="verCarrinho()">🛒 Ver Carrinho</button>

<script>
function adicionar(nome, preco){
  let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
  carrinho.push({nome, preco});
  localStorage.setItem('carrinho', JSON.stringify(carrinho));
  alert("Adicionado!");
}

function verCarrinho(){
  let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
  let total = 0;
  let texto = "";

  carrinho.forEach(i => {
    texto += i.nome + " - R$" + i.preco + "\n";
    total += i.preco;
  });

  alert(texto + "\nTotal: R$" + total);
}
</script>

</body>
</html>
