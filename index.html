<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  margin: 0;
}
.container {
  width: 350px;
  margin: 80px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h2 {
  text-align: center;
}
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #4facfe;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #00c6ff;
}
.link {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #4facfe;
}
.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="loginUser" placeholder="Usuário">
  <input type="password" id="loginPass" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <div class="link" onclick="mostrarCadastro()">Criar conta</div>
  <p id="msg"></p>
</div>

<div class="container" id="cadastroBox" style="display:none;">
  <h2>Cadastro</h2>
  <input type="text" id="cadUser" placeholder="Usuário">
  <input type="password" id="cadPass" placeholder="Senha">
  <button onclick="cadastrar()">Cadastrar</button>
  <div class="link" onclick="mostrarLogin()">Voltar</div>
</div>

<div class="container" id="painel" style="display:none; width:600px;">
  <h2>Reclamações</h2>
  <textarea id="reclamacao" placeholder="Descreva o problema..."></textarea>
  <input type="file" id="foto" accept="image/*">
  <button onclick="salvar()">Enviar</button>
  <div id="lista"></div>
</div>

<script>
function mostrarCadastro(){
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('cadastroBox').style.display = 'block';
}

function mostrarLogin(){
  document.getElementById('cadastroBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'block';
}

function cadastrar(){
  let user = document.getElementById('cadUser').value;
  let pass = document.getElementById('cadPass').value;

  let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
  usuarios.push({user, pass});
  localStorage.setItem('usuarios', JSON.stringify(usuarios));

  alert('Cadastro realizado!');
  mostrarLogin();
}

function login(){
  let user = document.getElementById('loginUser').value;
  let pass = document.getElementById('loginPass').value;

  let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
  let valido = usuarios.find(u => u.user === user && u.pass === pass);

  if(valido){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('painel').style.display = 'block';
    mostrar();
  } else {
    document.getElementById('msg').innerText = 'Login inválido';
  }
}

function salvar(){
  let texto = document.getElementById('reclamacao').value;
  let arquivo = document.getElementById('foto').files[0];
  let lista = JSON.parse(localStorage.getItem('dados')) || [];

  if(arquivo){
    let reader = new FileReader();
    reader.onload = function(e){
      lista.push({texto: texto, imagem: e.target.result});
      localStorage.setItem('dados', JSON.stringify(lista));
      mostrar();
    }
    reader.readAsDataURL(arquivo);
  } else {
    lista.push({texto: texto, imagem: null});
    localStorage.setItem('dados', JSON.stringify(lista));
    mostrar();
  }
}

function mostrar(){
  let lista = JSON.parse(localStorage.getItem('dados')) || [];
  let div = document.getElementById('lista');
  div.innerHTML = '';

  lista.forEach((item) => {
    div.innerHTML += `
      <div class='card'>
        <p>${item.texto}</p>
        ${item.imagem ? `<img src="${item.imagem}" style="width:100%; max-width:300px; border-radius:8px;">` : ''}
      </div>
    `;
  });
}
</script>

</body>
</html>
