<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Curso</title>
</head>
<body>

<h2>Curso Técnico</h2>
<p>Aprenda programação e tecnologia.</p>

<div id="chat"></div>
<input placeholder="Pergunte..." onkeypress="enviar(event)">

<script>
function responder(t){
  t = t.toLowerCase();

  if(t.includes("curso")) return "Curso de programação completo!";
  if(t.includes("duração")) return "Dura 2 anos!";
  if(t.includes("emprego")) return "Sim, prepara para o mercado!";
  return "Não entendi.";
}

function enviar(e){
  if(e.key === "Enter"){
    let input = e.target;
    let chat = document.getElementById("chat");

    chat.innerHTML += "<p>Você: "+input.value+"</p>";
    chat.innerHTML += "<p>Bot: "+responder(input.value)+"</p>";

    input.value="";
  }
}
</script>

</body>
</html>
