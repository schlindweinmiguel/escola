<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial;
  background:#f0f2f5;
  padding:20px;
}
textarea, input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  padding:10px;
  background:#4facfe;
  color:white;
  border:none;
  border-radius:8px;
}
.card{
  background:white;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Painel de Reclamações</h2>

<div id="form">
  <textarea id="reclamacao" placeholder="Descreva o problema"></textarea>
  <input type="file" id="foto">
  <button onclick="enviar()">Enviar</button>
</div>

<div id="admin" style="display:none;">
  <h3>Todas reclamações</h3>
  <div id="lista"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let email = localStorage.getItem("userEmail");

if(!email){
  window.location.href = "index.html";
}

// 👑 ADMIN
if(email === "m.schlindwein@escola.pr.gov.br"){
  document.getElementById("admin").style.display = "block";
  carregar();
}

function enviar(){
  let texto = document.getElementById("reclamacao").value;
  let arquivo = document.getElementById("foto").files[0];

  if(!texto){
    alert("Digite algo!");
    return;
  }

  if(arquivo){
    let reader = new FileReader();
    reader.onload = function(e){
      salvar(texto, e.target.result);
    }
    reader.readAsDataURL(arquivo);
  }else{
    salvar(texto, null);
  }
}

function salvar(texto, imagem){
  db.collection("reclamacoes").add({
    texto: texto,
    imagem: imagem,
    email: email,
    data: new Date()
  });

  alert("Enviado!");
}

function carregar(){
  db.collection("reclamacoes").onSnapshot(snapshot => {
    let div = document.getElementById("lista");
    div.innerHTML = "";

    snapshot.forEach(doc => {
      let item = doc.data();

      div.innerHTML += `
        <div class="card">
          <p><b>${item.email}</b></p>
          <p>${item.texto}</p>
          ${item.imagem ? `<img src="${item.imagem}" style="max-width:300px;">` : ""}
        </div>
      `;
    });
  });
}
</script>

</body>
</html>
