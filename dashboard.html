<!DOCTYPE html>
  <h3>Nova Reclamação</h3>
  <textarea id="reclamacao" placeholder="Descreva o problema..."></textarea>
  <input type="file" id="foto" accept="image/*">
  <button onclick="salvar()">Enviar</button>

  <h3>Reclamações</h3>
  <div id="lista"></div>
</div>

<script>
if(localStorage.getItem('auth') !== 'true'){
  window.location.href = 'index.html';
}

function salvar(){
  let texto = document.getElementById('reclamacao').value;
  let arquivo = document.getElementById('foto').files[0];
  let lista = JSON.parse(localStorage.getItem('dados')) || [];

  if(arquivo){
    let reader = new FileReader();
    reader.onload = function(e){
      lista.push({texto: texto, imagem: e.target.result});
      localStorage.setItem('dados', JSON.stringify(lista));
      mostrar();
    }
    reader.readAsDataURL(arquivo);
  } else {
    lista.push({texto: texto, imagem: null});
    localStorage.setItem('dados', JSON.stringify(lista));
    mostrar();
  }
}

function mostrar(){
  let lista = JSON.parse(localStorage.getItem('dados')) || [];
  let div = document.getElementById('lista');
  div.innerHTML = '';

  lista.forEach((item) => {
    div.innerHTML += `
      <div class='card'>
        <p>${item.texto}</p>
        ${item.imagem ? `<img src="${item.imagem}" style="width:100%; max-width:300px; border-radius:8px;">` : ''}
      </div>
    `;
  });
}</div>`;
  });
}

mostrar();
</script>

</body>
</html>
