<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Nova Reclamação</h2>
<textarea id="texto"></textarea>
<input type="file" id="foto">
<button onclick="salvar()">Enviar</button>

<h2>Reclamações</h2>
<div id="lista"></div>

<h2>📊 Gráfico</h2>
<canvas id="grafico"></canvas>

<script src="script.js"></script>

<script>
function gerarGrafico(){
  let lista = JSON.parse(localStorage.getItem('dados')) || [];

  let comFoto = lista.filter(i => i.imagem).length;
  let semFoto = lista.length - comFoto;

  new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
      labels: ['Com Foto', 'Sem Foto'],
      datasets: [{
        label: 'Reclamações',
        data: [comFoto, semFoto]
      }]
    }
  });
}

gerarGrafico();
</script>

</body>
</html>
